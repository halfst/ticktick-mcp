# ticktick-mcp — self-hosted MCP server, alongside your other MCP services.
#
# Setup:
#   1. cp .env.example .env   and fill in TICKTICK_SESSION_TOKEN (recommended,
#      required for 2FA accounts) or TICKTICK_USERNAME + TICKTICK_PASSWORD.
#      The HTTP transport also requires a caller-auth mode — set
#      TICKTICK_MCP_AUTH in .env (see the README "Caller authentication").
#   2. docker compose up -d
#   3. Point your MCP host at http://<host>:8000/mcp/
#
# .env is gitignored and is NOT baked into the image — it is read at runtime.
services:
  ticktick-mcp:
    # Pulls the prebuilt multi-arch image. To build from source instead,
    # replace this line with `build: .`.
    image: ghcr.io/halfst/ticktick-mcp:0.1.2
    container_name: ticktick-mcp
    restart: unless-stopped
    # Credentials + optional settings come from the (gitignored) .env file.
    env_file:
      - .env
    environment:
      TICKTICK_MCP_TRANSPORT: http
      TICKTICK_MCP_HOST: 0.0.0.0
      TICKTICK_MCP_PORT: "8000"
      # Cache the session token on the persisted volume so login survives
      # restarts (matters for username/password mode).
      TICKTICK_TOKEN_CACHE: /data/session.json
    ports:
      - "8000:8000"
    volumes:
      - ticktick-token:/data

volumes:
  ticktick-token:
